# Ground truth for src/vuln_copy.c — VulnAnalysisService Phase-1 detector validation.
#
# Schema — vuln_findings: maps exported function name → expected detector outcome.
#   detector_id     : id from /list_vuln_detectors that MUST fire, or null = no finding allowed
#   vuln_class      : Finding.vuln_class the detector should report (omit when detector_id is null)
#   confidence_min  : lowest acceptable confidence tier (low < medium < high)

vuln_findings:
  Vuln_CopyToStack:
    detector_id: unbounded_copy
    vuln_class: copy
    confidence_min: high
  Safe_CopyBounded:
    detector_id: null
  Vuln_MemcpyUnchecked:
    detector_id: unbounded_copy
    vuln_class: copy
    confidence_min: medium
  Safe_MemcpyChecked:
    # Phase-1 hasDominatingCompare is approximate (no CFG dominance, no
    # COPY/CAST chase on the compare side). A 'medium' finding is tolerated
    # here; tighten to detector_id: null once Phase-2 lands true dominance.
    detector_id: unbounded_copy
    confidence_max: medium
    expected_false_positive: true
