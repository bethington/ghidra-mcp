# OpenSSF Scorecard runs ~18 automated security checks against the
# repository (signed releases, dependency pinning, branch protection,
# CI hardening, etc.) and publishes the results to both the Security
# tab (via SARIF upload) and the public scorecards.dev database that
# backs the README badge.
#
# Workflow template source:
#   https://github.com/ossf/scorecard-action
#
# Why the schedule: scorecards.dev rate-limits per repo; weekly is the
# recommended cadence. Push triggers run too so a security-relevant
# config change (CODEOWNERS, branch protection, workflow hardening)
# reflects in the badge within minutes instead of waiting a week.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '17 8 * * 1'   # Mondays 08:17 UTC
  push:
    branches: [main]
  # Manual trigger so the score can be refreshed without forcing a
  # dummy commit (useful after enabling repo Settings toggles like
  # Dependabot security alerts or branch protection rulesets, which
  # don't themselves push anything).
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to the Security tab.
      security-events: write
      # Required for publishing to scorecards.dev (the public dataset
      # the README badge reads from).
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186  # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results=true is what feeds scorecards.dev so the
          # README badge has data to read. Without this the badge
          # will keep returning 404 even after the workflow runs.
          publish_results: true

      # Upload the artifact so we can inspect raw findings from the
      # Actions run page (the SARIF upload to the Security tab below
      # doesn't preserve the full payload).
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Upload to GitHub's code-scanning so findings show up in the
      # repository's Security tab alongside Dependabot / CodeQL.
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: results.sarif
